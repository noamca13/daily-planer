<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Momentum"/>
  <meta name="theme-color" content="#0a0b0e"/>
  <title>Momentum</title>
  <script>
    (function(){
      try{
        var c=document.createElement('canvas');
        c.width=180;c.height=180;
        var ctx=c.getContext('2d');
        ctx.fillStyle='#050506';
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(0,0,180,180,36);
        else ctx.rect(0,0,180,180);
        ctx.fill();
        ctx.font='110px serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText('⚡',90,90);
        var link=document.createElement('link');
        link.rel='apple-touch-icon';
        link.href=c.toDataURL('image/png');
        document.head.appendChild(link);
      }catch(e){}
    })();
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
    body{background:#0a0b0e;color:#f5f5f7;font-family:'Heebo',sans-serif;overscroll-behavior:none;}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
    select option{background:#0d0e13;color:#f5f5f7;}
    @keyframes pulse{0%,100%{box-shadow:0 0 10px #4ade80}50%{box-shadow:0 0 18px #4ade80,0 0 32px rgba(74,222,128,0.4)}}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(14px) scale(0.94)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulseBox{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    @keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
    @keyframes completePulse{0%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(1.02)}100%{opacity:1;transform:scale(1)}}
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap');
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Constants ──────────────────────────────────────────────────────────
    const HOUR_HEIGHT = 64; // px per hour in timeline
    const ALL_HOURS = Array.from({length:24},(_,i)=>i);
    const MINUTES = ["00","05","10","15","20","25","30","35","40","45","50","55"];
    const DURATIONS = [...Array.from({length:12},(_,i)=>(i+1)*5),90,120,150,180,210,240,270,300,360,420,480,540,600,660,720];
    const COLORS = ["#4ade80","#60a5fa","#f97316","#facc15","#c084fc","#f472b6","#34d399","#fb923c"];
    const HEB_DAYS = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
    const HEB_MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
    const DIFF = [
      {v:1,label:"קל",   icon:"🌱",pts:5,  accent:"#94a3b8",border:"rgba(148,163,184,0.22)",glow:null},
      {v:2,label:"בינוני",icon:"⚡",pts:15, accent:"#60a5fa",border:"rgba(96,165,250,0.4)",  glow:"rgba(96,165,250,0.14)"},
      {v:3,label:"קשה",  icon:"🔥",pts:30, accent:"#f97316",border:"rgba(249,115,22,0.55)",  glow:"rgba(249,115,22,0.22)"},
    ];
    const LEVELS = [
      {min:0,   name:"בהתחלה",    icon:"🌱",color:"#94a3b8"},
      {min:75,  name:"מתחיל לזוז",icon:"💧",color:"#7dd3fc"},
      {min:200, name:"בתנופה",    icon:"⚡",color:"#60a5fa"},
      {min:450, name:"חזק",       icon:"🔥",color:"#f97316"},
      {min:800, name:"בלתי עציר",icon:"💎",color:"#a78bfa"},
      {min:1400,name:"מאסטר",    icon:"👑",color:"#fbbf24"},
      {min:2500,name:"אגדה",      icon:"🌟",color:"#4ade80"},
    ];
    const DEFAULT_HABITS = [
      {id:"h1",name:"שתייה 8 כוסות",icon:"💧"},
      {id:"h2",name:"ספורט",icon:"🏃"},
      {id:"h3",name:"קריאה",icon:"📚"},
    ];
    const MYSTERY_REWARDS = [
      {type:"xp",amount:15, label:"+15 XP בונוס",icon:"⭐"},
      {type:"xp",amount:30, label:"+30 XP בונוס",icon:"💫"},
      {type:"xp",amount:50, label:"+50 XP!",      icon:"✨"},
      {type:"freeze",amount:1,label:"Streak Freeze!",icon:"❄️"},
      {type:"xp",amount:100,label:"+100 XP נדיר!", icon:"💎"},
    ];

    // ── Design tokens ──────────────────────────────────────────────────────
    const C = {
      bg:"#0a0b0e",card:"rgba(255,255,255,0.04)",cardHov:"rgba(255,255,255,0.07)",
      border:"rgba(255,255,255,0.08)",borderM:"rgba(255,255,255,0.14)",
      text:"#f5f5f7",sub:"#a1a1aa",muted:"#52525b",dim:"#3f3f46",
      accent:"#4ade80",accentD:"rgba(74,222,128,0.12)",accentB:"rgba(74,222,128,0.28)",
      amber:"#fbbf24",amberB:"rgba(251,191,36,0.25)",
      ice:"#7dd3fc",iceB:"rgba(125,211,252,0.25)",hot:"#f97316",
    };
    const inp = {width:"100%",background:"rgba(255,255,255,0.05)",border:`1px solid ${C.border}`,borderRadius:12,padding:"11px 14px",color:C.text,fontSize:14,fontFamily:"Heebo,sans-serif",boxSizing:"border-box",outline:"none"};
    const sel = {width:"100%",background:"rgba(255,255,255,0.05)",border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 8px",color:C.text,fontSize:13,fontFamily:"Heebo,sans-serif",outline:"none"};
    const lbl = {fontSize:10,color:C.muted,display:"block",marginBottom:4,letterSpacing:0.4,textTransform:"uppercase",fontWeight:600};

    // ── Helpers ────────────────────────────────────────────────────────────
    function localDateKey(d=new Date()){
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }
    const todayKey=()=>localDateKey();
    function addDays(s,n){const[y,m,d]=s.split("-").map(Number);return localDateKey(new Date(y,m-1,d+n));}
    function addMonths(s,n){const[y,m,d]=s.split("-").map(Number);return localDateKey(new Date(y,m-1+n,d));}
    function daysBetween(a,b){return Math.round((new Date(b+"T12:00:00")-new Date(a+"T12:00:00"))/86400000);}
    function fmtTime(h,m){return `${String(h).padStart(2,"0")}:${String(m||0).padStart(2,"0")}`;}
    function fmtDur(mins){if(mins<60)return `${mins} דק'`;const h=Math.floor(mins/60),m=mins%60;return m?`${h}:${String(m).padStart(2,"0")}`:`${h} שע'`;}
    function fmtDateHeb(s){const[y,m,d]=s.split("-").map(Number),dt=new Date(y,m-1,d);return `יום ${HEB_DAYS[dt.getDay()]}, ${dt.getDate()} ב${HEB_MONTHS[dt.getMonth()]}`;}
    function getWeekStart(s){const[y,m,d]=s.split("-").map(Number),dt=new Date(y,m-1,d);dt.setDate(dt.getDate()-dt.getDay());return localDateKey(dt);}
    function getMonthDays(s){const[y,m]=s.split("-").map(Number),first=new Date(y,m-1,1),last=new Date(y,m,0);const days=[];for(let i=1;i<=last.getDate();i++)days.push(localDateKey(new Date(y,m-1,i)));return{days,firstDow:first.getDay()};}
    function getLevel(xp){let l=LEVELS[0];for(const v of LEVELS)if(xp>=v.min)l=v;const i=LEVELS.indexOf(l),next=LEVELS[i+1];return{...l,next,pct:next?Math.round(((xp-l.min)/(next.min-l.min))*100):100};}
    function taskTopPct(task){return((task.hour*60+(task.minute||0))/(24*60))*100;}
    function taskHeightPct(task){return((task.durationMins||60)/(24*60))*100;}

    function useLocalStorage(key,init){
      const[val,setVal]=useState(()=>{
        try{const s=localStorage.getItem(key);return s?JSON.parse(s):(typeof init==="function"?init():init);}
        catch{return typeof init==="function"?init():init;}
      });
      useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{}},[key,val]);
      return[val,setVal];
    }

    function scheduleNotif(task){
      if(!("Notification" in window)||Notification.permission!=="granted")return;
      const t=new Date();t.setHours(task.hour,task.minute||0,0,0);
      const diff=t-new Date();
      if(diff>0&&diff<12*3600000)setTimeout(()=>new Notification("⏰ "+task.title,{body:fmtDur(task.durationMins||60)}),diff);
    }

    function buildMemory(allTasks){
      const mem={};
      Object.values(allTasks).flat().forEach(t=>{
        const k=t.title?.trim().toLowerCase();if(!k)return;
        if(!mem[k])mem[k]={title:t.title,color:t.color,durationMins:t.durationMins||60,difficulty:t.difficulty||1,count:0};
        mem[k].count++;mem[k].color=t.color;mem[k].durationMins=t.durationMins||60;mem[k].difficulty=t.difficulty||1;
      });
      return mem;
    }

    function applyTemplates(allTasks,templates,dateStr){
      const[y,m,d]=dateStr.split("-").map(Number),dt=new Date(y,m-1,d),dow=dt.getDay(),dom=dt.getDate();
      const apps=templates.filter(t=>t.recurrence==="daily"||(t.recurrence==="weekly"&&t.dow===dow)||(t.recurrence==="monthly"&&t.dom===dom));
      if(!apps.length)return allTasks[dateStr]||[];
      const existing=allTasks[dateStr]||[];
      const eIds=new Set(existing.map(t=>t.templateId).filter(Boolean));
      const toAdd=apps.filter(t=>!eIds.has(t.id)).map(t=>({
        id:Date.now()+Math.random(),title:t.title,hour:t.hour,minute:t.minute||0,durationMins:t.durationMins||60,
        color:t.color,reminder:t.reminder,note:t.note||"",done:false,templateId:t.id,difficulty:t.difficulty||1,isFocus:false
      }));
      return[...existing,...toAdd];
    }

    // ── Toggle component ───────────────────────────────────────────────────
    function Toggle({val,onChange}){
      return(
        <button onClick={()=>onChange(!val)} style={{width:46,height:24,borderRadius:12,background:val?C.accent:"rgba(255,255,255,0.1)",border:"none",cursor:"pointer",position:"relative",flexShrink:0,transition:"background 0.2s"}}>
          <div style={{position:"absolute",top:3,right:val?3:25,width:18,height:18,borderRadius:"50%",background:"white",transition:"right 0.2s",boxShadow:"0 1px 4px rgba(0,0,0,0.4)"}}/>
        </button>
      );
    }

    // ── Mystery Box ────────────────────────────────────────────────────────
    function MysteryBoxModal({reward,onClose}){
      const[opened,setOpened]=useState(false);
      return(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:90,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(20px)",animation:"fadeIn 0.3s"}}>
          <div style={{background:"linear-gradient(180deg,#181a25,#0a0b10)",border:`1px solid ${C.borderM}`,borderRadius:24,padding:"32px 28px",textAlign:"center",minWidth:280,maxWidth:340,boxShadow:"0 0 60px rgba(251,191,36,0.32)"}}>
            {!opened?(
              <>
                <div style={{fontSize:11,color:C.amber,letterSpacing:2,textTransform:"uppercase",marginBottom:10,fontWeight:700}}>תיבת הפתעה</div>
                <div style={{fontSize:88,padding:20,animation:"pulseBox 1.2s ease-in-out infinite",cursor:"pointer"}} onClick={()=>setOpened(true)}>🎁</div>
                <div style={{fontSize:14,color:C.sub,marginBottom:16}}>הרווחת על משימה קשה!</div>
                <button onClick={()=>setOpened(true)} style={{background:`linear-gradient(135deg,${C.amber},#f97316)`,border:"none",borderRadius:12,padding:"12px 32px",color:"#000",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>פתח 🎁</button>
              </>
            ):(
              <>
                <div style={{fontSize:11,color:C.amber,letterSpacing:2,textTransform:"uppercase",marginBottom:8,fontWeight:700}}>זכית!</div>
                <div style={{fontSize:80,marginBottom:12,animation:"bounceIn 0.6s cubic-bezier(.34,1.56,.64,1)"}}>{reward.icon}</div>
                <div style={{fontSize:18,fontWeight:800,color:C.text,marginBottom:6}}>{reward.label}</div>
                <button onClick={onClose} style={{marginTop:20,background:`linear-gradient(135deg,${C.accent},#22c55e)`,border:"none",borderRadius:12,padding:"11px 28px",color:"#000",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>מעולה ✓</button>
              </>
            )}
          </div>
        </div>
      );
    }

    // ── Level Up ───────────────────────────────────────────────────────────
    function LevelUpModal({level,onClose}){
      return(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.93)",zIndex:95,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(24px)",animation:"fadeIn 0.4s"}}>
          <div style={{background:`linear-gradient(180deg,${level.color}22,#0a0b10)`,border:`1px solid ${level.color}50`,borderRadius:24,padding:"36px 32px",textAlign:"center",minWidth:300,boxShadow:`0 0 80px ${level.color}40`}}>
            <div style={{fontSize:11,color:level.color,letterSpacing:3,textTransform:"uppercase",marginBottom:8,fontWeight:800}}>עלית רמה!</div>
            <div style={{fontSize:96,marginBottom:8,animation:"bounceIn 0.6s cubic-bezier(.34,1.56,.64,1)"}}>{level.icon}</div>
            <div style={{fontSize:24,fontWeight:900,color:level.color,marginBottom:8}}>{level.name}</div>
            <div style={{fontSize:13,color:C.sub,marginBottom:24,lineHeight:1.6}}>אתה ממשיך, אתה עולה.</div>
            <button onClick={onClose} style={{background:`linear-gradient(135deg,${level.color},${level.color}cc)`,border:"none",borderRadius:14,padding:"13px 36px",color:"#000",fontWeight:800,fontSize:15,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>קדימה</button>
          </div>
        </div>
      );
    }

    // ── Focus Mode ─────────────────────────────────────────────────────────
    function FocusMode({task,onClose,onComplete}){
      const[mins,setMins]=useState(25);
      const[secsLeft,setSecsLeft]=useState(null);
      const[running,setRunning]=useState(false);
      const ref=useRef(null);
      function start(){setSecsLeft(mins*60);setRunning(true);}
      function stop(){setRunning(false);clearInterval(ref.current);setSecsLeft(null);}
      useEffect(()=>{
        if(running&&secsLeft!=null){
          ref.current=setInterval(()=>setSecsLeft(s=>{
            if(s<=1){clearInterval(ref.current);setRunning(false);if(Notification.permission==="granted")new Notification("✅ פוקוס הושלם!",{body:task?.title||""});onComplete?.(mins);return 0;}
            return s-1;
          }),1000);
        }
        return()=>clearInterval(ref.current);
      },[running]);
      const display=secsLeft!=null?`${String(Math.floor(secsLeft/60)).padStart(2,"0")}:${String(secsLeft%60).padStart(2,"0")}`:`${String(mins).padStart(2,"0")}:00`;
      const pct=secsLeft!=null?(1-(secsLeft/(mins*60)))*100:0;
      const r=70,circ=2*Math.PI*r;
      return(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.96)",zIndex:80,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(28px)"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
          <div style={{background:"linear-gradient(180deg,#0e0f15,#06070a)",border:`1px solid ${C.borderM}`,borderRadius:28,padding:"40px 32px",textAlign:"center",minWidth:320,boxShadow:`0 0 80px rgba(74,222,128,0.18)`}}>
            <div style={{fontSize:11,color:C.accent,letterSpacing:2,textTransform:"uppercase",marginBottom:6,fontWeight:700}}>🎯 פוקוס</div>
            <div style={{fontWeight:700,fontSize:16,color:C.text,marginBottom:24,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:260,margin:"0 auto 28px"}}>{task?.title||"זמן עמוק"}</div>
            <div style={{position:"relative",width:170,height:170,margin:"0 auto 28px"}}>
              <svg width={170} height={170} style={{transform:"rotate(-90deg)"}}>
                <circle cx={85} cy={85} r={r} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth={10}/>
                <circle cx={85} cy={85} r={r} fill="none" stroke={C.accent} strokeWidth={10} strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} strokeLinecap="round" style={{transition:"stroke-dashoffset 1s linear",filter:`drop-shadow(0 0 8px ${C.accent})`}}/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{fontSize:36,fontWeight:900,color:C.text,fontVariantNumeric:"tabular-nums"}}>{display}</div>
              </div>
            </div>
            {!running&&secsLeft==null&&(
              <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:24}}>
                {[15,25,45,60].map(p=>(
                  <button key={p} onClick={()=>setMins(p)} style={{padding:"7px 14px",borderRadius:10,border:`1px solid ${mins===p?C.accent:C.border}`,background:mins===p?C.accentD:"transparent",color:mins===p?C.accent:C.sub,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>
                    {p}′
                  </button>
                ))}
              </div>
            )}
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              {!running&&secsLeft==null&&<button onClick={start} style={{background:`linear-gradient(135deg,${C.accent},#22c55e)`,border:"none",borderRadius:14,padding:"13px 36px",color:"#000",fontWeight:800,fontSize:15,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>התחל</button>}
              {running&&<button onClick={stop} style={{background:"rgba(244,114,182,0.15)",border:"1px solid rgba(244,114,182,0.3)",borderRadius:14,padding:"13px 32px",color:"#f472b6",fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>עצור</button>}
              {!running&&secsLeft===0&&<button onClick={()=>{setSecsLeft(null);setMins(25);}} style={{background:C.accentD,border:`1px solid ${C.accentB}`,borderRadius:14,padding:"13px 28px",color:C.accent,fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>שוב 🔄</button>}
              <button onClick={onClose} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"13px 22px",color:C.sub,fontSize:14,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>סגור</button>
            </div>
          </div>
        </div>
      );
    }

    // ── Onboarding ─────────────────────────────────────────────────────────
    function Onboarding({onDone}){
      const[step,setStep]=useState(0);
      const STEPS=[
        {icon:"🎯",title:"ברוך הבא ל-Momentum",body:"זאת לא עוד אפליקציית משימות. זה כלי שיעזור לך לבנות הרגלים אמיתיים ולעמוד במה שחשוב."},
        {icon:"📍",title:"תכנון אם-אז",body:"בכל משימה תוכל להוסיף: 'אם סיימתי לאכול — אז אני יושב ולומד'. מחקר מראה שזה מכפיל את הסיכוי לביצוע."},
        {icon:"🔥",title:"אל תשבור את השרשרת",body:"כל יום שאתה עומד במשימות — קו אש גדל. יש לך 3 Streak Freezes שמצילים אותך מימים קשים."},
        {icon:"⭐",title:"קושי = XP אמיתי",body:"משימה קשה = 30 XP. קלה = 5 XP. המטרה היא לצבור XP על הדברים שבאמת חשובים."},
      ];
      const s=STEPS[step];
      return(
        <div style={{position:"fixed",inset:0,background:"rgba(6,7,10,0.97)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{maxWidth:380,width:"100%",background:"linear-gradient(180deg,#101218,#08090c)",border:`1px solid ${C.borderM}`,borderRadius:24,padding:"36px 28px 28px",textAlign:"center"}}>
            <div style={{fontSize:64,marginBottom:14,animation:"bounceIn 0.5s cubic-bezier(.34,1.56,.64,1)"}} key={step}>{s.icon}</div>
            <div style={{fontSize:21,fontWeight:900,color:C.text,marginBottom:10}}>{s.title}</div>
            <div style={{fontSize:14,color:C.sub,lineHeight:1.65,marginBottom:24}}>{s.body}</div>
            <div style={{display:"flex",gap:5,justifyContent:"center",marginBottom:20}}>
              {STEPS.map((_,i)=><div key={i} style={{width:i===step?20:6,height:6,borderRadius:3,background:i===step?C.accent:C.border,transition:"all 0.3s"}}/>)}
            </div>
            <button onClick={()=>step<STEPS.length-1?setStep(step+1):onDone()} style={{width:"100%",background:`linear-gradient(135deg,${C.accent},#22c55e)`,border:"none",borderRadius:14,padding:"14px",color:"#000",fontWeight:800,fontSize:15,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>
              {step<STEPS.length-1?"הבא →":"בוא נתחיל"}
            </button>

    // ── Visual Timeline ────────────────────────────────────────────────────
    function VisualTimeline({tasks,isToday,now,selectedDate,onToggle,onEdit,onDelete,onFocus,onAddAt}){
      const containerRef=useRef(null);
      const[dragging,setDragging]=useState(null); // {id,startY,origHour,origMin}
      const[dragPos,setDragPos]=useState({}); // id -> {hour,minute}
      const nowMins=now.getHours()*60+now.getMinutes();

      function getTimeFromY(y){
        const totalMins=Math.round((y/(ALL_HOURS.length*HOUR_HEIGHT))*24*60/5)*5;
        const clamped=Math.max(0,Math.min(24*60-5,totalMins));
        return{hour:Math.floor(clamped/60),minute:clamped%60};
      }

      function onPointerDown(e,task){
        e.stopPropagation();
        const rect=containerRef.current.getBoundingClientRect();
        const startY=e.clientY-rect.top;
        setDragging({id:task.id,startY,origY:(task.hour*60+(task.minute||0))/60*HOUR_HEIGHT});
        e.currentTarget.setPointerCapture(e.pointerId);
      }

      function onPointerMove(e){
        if(!dragging)return;
        const rect=containerRef.current.getBoundingClientRect();
        const y=e.clientY-rect.top-(dragging.startY-dragging.origY);
        const t=getTimeFromY(Math.max(0,y));
        setDragPos(p=>({...p,[dragging.id]:t}));
      }

      function onPointerUp(e,task){
        if(!dragging)return;
        const pos=dragPos[dragging.id];
        if(pos){
          const moved=Math.abs((pos.hour*60+pos.minute)-(task.hour*60+(task.minute||0)))>4;
          if(moved) onEdit({...task,hour:pos.hour,minute:pos.minute},true);
        }
        setDragging(null);
        setDragPos(p=>{const n={...p};delete n[dragging.id];return n;});
      }

      function handleTap(e,task){
        // long press = edit, short tap = toggle done
        // We use onEdit for double-tap / explicit edit button
      }

      const totalH=ALL_HOURS.length*HOUR_HEIGHT;

      return(
        <div style={{padding:"0 0 100px"}}>
          <div ref={containerRef} style={{position:"relative",display:"flex"}} onPointerMove={onPointerMove}>
            {/* Hour labels + lines */}
            <div style={{width:48,flexShrink:0,position:"relative",height:totalH}}>
              {ALL_HOURS.map(h=>(
                <div key={h} style={{position:"absolute",top:h*HOUR_HEIGHT,width:"100%",paddingTop:4,textAlign:"left"}}>
                  <span style={{fontSize:11,fontWeight:isToday&&h===now.getHours()?800:500,color:isToday&&h===now.getHours()?C.accent:isToday&&h<now.getHours()?C.dim:"#6b7280",fontVariantNumeric:"tabular-nums"}}>
                    {String(h).padStart(2,"0")}:00
                  </span>
                </div>
              ))}
            </div>

            {/* Main area */}
            <div style={{flex:1,position:"relative",height:totalH}} onClick={e=>{
              if(dragging)return;
              const rect=e.currentTarget.getBoundingClientRect();
              const y=e.clientY-rect.top;
              const t=getTimeFromY(y);
              onAddAt(t.hour,t.minute);
            }}>
              {/* Hour grid lines */}
              {ALL_HOURS.map(h=>(
                <div key={h} style={{position:"absolute",top:h*HOUR_HEIGHT,left:0,right:0,height:1,background:isToday&&h===now.getHours()?"rgba(74,222,128,0.25)":"rgba(255,255,255,0.05)"}}/>
              ))}

              {/* Current time needle */}
              {isToday&&(
                <div style={{position:"absolute",left:0,right:0,top:(nowMins/60)*HOUR_HEIGHT,zIndex:5,pointerEvents:"none"}}>
                  <div style={{position:"absolute",left:0,right:0,height:1.5,background:`linear-gradient(90deg,${C.accent},transparent)`}}/>
                  <div style={{position:"absolute",left:-5,top:-4,width:9,height:9,borderRadius:"50%",background:C.accent,boxShadow:`0 0 10px ${C.accent}`,animation:"pulse 2s infinite"}}/>
                  <span style={{position:"absolute",left:2,top:-16,fontSize:9,color:C.accent,fontWeight:800,letterSpacing:1}}>עכשיו</span>
                </div>
              )}

              {/* Task blocks */}
              {tasks.map(task=>{
                const pos=dragPos[task.id];
                const h=pos?pos.hour:task.hour;
                const m=pos?pos.minute:(task.minute||0);
                const topPx=(h*60+m)/60*HOUR_HEIGHT;
                const heightPx=Math.max(28,(task.durationMins||60)/60*HOUR_HEIGHT);
                const d=DIFF.find(x=>x.v===(task.difficulty||1))||DIFF[0];
                const isDragging=dragging?.id===task.id;
                const isPast=isToday&&(h*60+m+task.durationMins)<nowMins;

                return(
                  <div key={task.id}
                    onPointerDown={e=>onPointerDown(e,task)}
                    onPointerUp={e=>onPointerUp(e,task)}
                    style={{
                      position:"absolute",left:4,right:4,top:topPx,height:heightPx,
                      background:task.done?"rgba(74,222,128,0.08)":`linear-gradient(135deg,${task.color}1a,${task.color}0a)`,
                      border:`1px solid ${task.done?"rgba(74,222,128,0.25)":`${task.color}35`}`,
                      borderRight:`3px solid ${task.done?C.accent:task.color}`,
                      borderRadius:10,padding:"5px 8px",cursor:"grab",overflow:"hidden",
                      opacity:isPast&&!task.done?0.45:1,
                      boxShadow:isDragging?`0 8px 24px rgba(0,0,0,0.5)`:!task.done&&d.glow?`0 2px 10px ${d.glow}`:"none",
                      transform:isDragging?"scale(1.02)":"scale(1)",
                      transition:isDragging?"none":"box-shadow 0.2s, transform 0.2s",
                      zIndex:isDragging?20:1,
                      touchAction:"none",userSelect:"none",
                    }}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:5,height:"100%"}}>
                      {/* Checkbox */}
                      <button onClick={e=>{e.stopPropagation();onToggle(task.id);}} style={{width:18,height:18,borderRadius:"50%",flexShrink:0,background:task.done?C.accent:"transparent",border:`2px solid ${task.done?C.accent:task.color}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginTop:1,transition:"all 0.2s"}} onPointerDown={e=>e.stopPropagation()}>
                        {task.done&&<span style={{color:"#000",fontSize:10,fontWeight:900,lineHeight:1}}>✓</span>}
                      </button>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:Math.min(13,heightPx>36?13:11),textDecoration:task.done?"line-through":"none",color:task.done?C.muted:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          {task.title}
                        </div>
                        {heightPx>36&&(
                          <div style={{fontSize:10,color:C.muted,marginTop:1}}>{fmtTime(h,m)} · {fmtDur(task.durationMins||60)}</div>
                        )}
                      </div>
                      {/* Action buttons */}
                      <div style={{display:"flex",gap:2,flexShrink:0}} onPointerDown={e=>e.stopPropagation()}>
                        <button onClick={e=>{e.stopPropagation();onEdit(task);}} style={{background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer",padding:"1px 3px",lineHeight:1}}
                          onMouseEnter={e=>e.currentTarget.style.color=C.accent}
                          onMouseLeave={e=>e.currentTarget.style.color=C.muted}>✎</button>
                        <button onClick={e=>{e.stopPropagation();onFocus(task);}} style={{background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer",padding:"1px 3px",lineHeight:1}}
                          onMouseEnter={e=>e.currentTarget.style.color=C.accent}
                          onMouseLeave={e=>e.currentTarget.style.color=C.muted}>⏱</button>
                        <button onClick={e=>{e.stopPropagation();onDelete(task.id);}} style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer",padding:"1px 3px",lineHeight:1}}
                          onMouseEnter={e=>e.currentTarget.style.color="#f472b6"}
                          onMouseLeave={e=>e.currentTarget.style.color=C.muted}>×</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ── Habits Panel ───────────────────────────────────────────────────────
    function HabitsPanel({habits,habitLog,dateKey,onToggle,onAdd,onDelete,onEditHabit}){
      const[adding,setAdding]=useState(false);
      const[editingHabit,setEditingHabit]=useState(null);
      const[name,setName]=useState("");
      const[icon,setIcon]=useState("⭐");
      const log=habitLog[dateKey]||{};
      const ICONS=["⭐","💧","🏃","📚","🧘","🍎","💊","🎯","🛏️","✍️","🚶","🧹","☕","🥗","🎵"];
      const done=Object.values(log).filter(Boolean).length;

      function saveNew(){
        if(!name.trim())return;
        onAdd({id:"h"+Date.now(),name:name.trim(),icon});
        setName("");setAdding(false);
      }
      function saveEdit(){
        if(!editingHabit||!editingHabit.name.trim())return;
        onEditHabit(editingHabit);
        setEditingHabit(null);
      }

      return(
        <div style={{padding:"0 16px 16px"}}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div>
                <span style={{fontWeight:700,fontSize:14,color:C.text}}>🌱 הרגלים יומיים</span>
                {done>0&&<span style={{fontSize:11,color:C.accent,marginRight:8,fontWeight:600}}> {done}/{habits.length} ✓</span>}
              </div>
              <button onClick={()=>setAdding(!adding)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 11px",color:C.sub,fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>{adding?"ביטול":"+ הרגל"}</button>
            </div>

            {adding&&(
              <div style={{marginBottom:12,padding:12,background:"rgba(255,255,255,0.03)",borderRadius:11,border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:9}}>
                  {ICONS.map(ic=><button key={ic} onClick={()=>setIcon(ic)} style={{fontSize:18,padding:"3px 7px",borderRadius:8,border:`1px solid ${icon===ic?C.accent:C.border}`,background:icon===ic?C.accentD:"transparent",cursor:"pointer"}}>{ic}</button>)}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveNew()} placeholder="שם ההרגל"
                    style={{flex:1,background:"rgba(255,255,255,0.05)",border:`1px solid ${C.border}`,borderRadius:9,padding:"8px 11px",color:C.text,fontSize:13,fontFamily:"Heebo,sans-serif",outline:"none"}}/>
                  <button onClick={saveNew} style={{background:C.accentD,border:`1px solid ${C.accentB}`,borderRadius:9,padding:"8px 14px",color:C.accent,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>שמור</button>
                </div>
              </div>
            )}

            {editingHabit&&(
              <div style={{marginBottom:12,padding:12,background:"rgba(255,255,255,0.03)",borderRadius:11,border:`1px solid ${C.accentB}`}}>
                <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:8}}>עריכת הרגל</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:9}}>
                  {ICONS.map(ic=><button key={ic} onClick={()=>setEditingHabit(h=>({...h,icon:ic}))} style={{fontSize:18,padding:"3px 7px",borderRadius:8,border:`1px solid ${editingHabit.icon===ic?C.accent:C.border}`,background:editingHabit.icon===ic?C.accentD:"transparent",cursor:"pointer"}}>{ic}</button>)}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <input value={editingHabit.name} onChange={e=>setEditingHabit(h=>({...h,name:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&saveEdit()}
                    style={{flex:1,background:"rgba(255,255,255,0.05)",border:`1px solid ${C.border}`,borderRadius:9,padding:"8px 11px",color:C.text,fontSize:13,fontFamily:"Heebo,sans-serif",outline:"none"}}/>
                  <button onClick={saveEdit} style={{background:C.accentD,border:`1px solid ${C.accentB}`,borderRadius:9,padding:"8px 14px",color:C.accent,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>שמור</button>
                  <button onClick={()=>setEditingHabit(null)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:9,padding:"8px 12px",color:C.sub,fontSize:13,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>ביטול</button>
                </div>
              </div>
            )}

            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {habits.map(h=>{
                const d=!!log[h.id];
                return(
                  <div key={h.id} style={{display:"flex",alignItems:"center",gap:11,padding:"9px 11px",borderRadius:11,background:d?"rgba(74,222,128,0.07)":"rgba(255,255,255,0.02)",border:`1px solid ${d?"rgba(74,222,128,0.22)":C.border}`,transition:"all 0.2s"}}>
                    <span style={{fontSize:19}}>{h.icon}</span>
                    <span style={{flex:1,fontSize:14,color:d?C.muted:C.text,textDecoration:d?"line-through":"none"}}>{h.name}</span>
                    <button onClick={()=>setEditingHabit({...h})} style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer",padding:"1px 4px"}}
                      onMouseEnter={e=>e.currentTarget.style.color=C.accent}
                      onMouseLeave={e=>e.currentTarget.style.color=C.muted}>✎</button>
                    <button onClick={()=>onDelete(h.id)} style={{background:"none",border:"none",color:C.muted,fontSize:14,cursor:"pointer",padding:"1px 4px"}}
                      onMouseEnter={e=>e.currentTarget.style.color="#f472b6"}
                      onMouseLeave={e=>e.currentTarget.style.color=C.muted}>×</button>
                    <button onClick={()=>onToggle(dateKey,h.id)} style={{width:27,height:27,borderRadius:"50%",border:`2px solid ${d?C.accent:C.muted}`,background:d?C.accent:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",flexShrink:0,boxShadow:d?`0 0 10px ${C.accent}50`:"none"}}>
                      {d&&<span style={{color:"#000",fontSize:12,fontWeight:900}}>✓</span>}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ── Streak Chain ───────────────────────────────────────────────────────
    function StreakChain({allTasks,habitLog,today}){
      const days=Array.from({length:21},(_,i)=>addDays(today,i-20));
      return(
        <div style={{padding:"14px 16px 0"}}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"12px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:11,color:C.sub,fontWeight:700}}>🔗 21 ימים אחרונים</span>
              <span style={{fontSize:10,color:C.muted}}>אל תשבור את השרשרת</span>
            </div>
            <div style={{display:"flex",gap:3,alignItems:"flex-end",height:36}}>
              {days.map(d=>{
                const tasks=allTasks[d]||[];
                const habits=habitLog[d]||{};
                const allDone=tasks.length>0&&tasks.every(t=>t.done);
                const partial=tasks.length>0&&tasks.some(t=>t.done)&&!allDone;
                const hasHabits=Object.values(habits).some(Boolean);
                const isT=d===today;
                const active=allDone||hasHabits;
                const h=active?32:partial?20:8;
                const bg=isT?(active?C.accent:"rgba(74,222,128,0.18)"):active?"rgba(74,222,128,0.55)":partial?"rgba(251,191,36,0.4)":"rgba(255,255,255,0.05)";
                return<div key={d} title={fmtDateHeb(d)} style={{flex:1,height:h,borderRadius:3,background:bg,transition:"height 0.5s ease"}}/>;
              })}
            </div>
          </div>
        </div>
      );
    }

    // ── Weekly View ────────────────────────────────────────────────────────
    function WeeklyView({allTasks,weekStart,onDayClick}){
      const days=Array.from({length:7},(_,i)=>addDays(weekStart,i)),today=todayKey();
      return(
        <div style={{padding:"0 16px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
            {days.map(d=>{
              const tasks=allTasks[d]||[],done=tasks.filter(t=>t.done).length,isT=d===today;
              return(
                <div key={d} onClick={()=>onDayClick(d)} style={{background:isT?C.accentD:C.card,border:`1px solid ${isT?C.accentB:C.border}`,borderRadius:12,padding:"10px 6px",cursor:"pointer",textAlign:"center",transition:"background 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background=isT?"rgba(74,222,128,0.18)":C.cardHov}
                  onMouseLeave={e=>e.currentTarget.style.background=isT?C.accentD:C.card}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{HEB_DAYS[new Date(d+"T12:00:00").getDay()]}</div>
                  <div style={{fontWeight:isT?900:600,fontSize:16,color:isT?C.accent:C.text}}>{new Date(d+"T12:00:00").getDate()}</div>
                  {tasks.length>0&&<><div style={{marginTop:5,height:3,background:"rgba(255,255,255,0.05)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.round(done/tasks.length*100)}%`,background:C.accent}}/></div><div style={{fontSize:9,color:C.muted,marginTop:3}}>{done}/{tasks.length}</div></>}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── Monthly View ───────────────────────────────────────────────────────
    function MonthlyView({allTasks,monthDate,onDayClick}){
      const{days,firstDow}=getMonthDays(monthDate),today=todayKey();
      return(
        <div style={{padding:"0 16px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
            {HEB_DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:10,color:C.muted,padding:"4px 0"}}>{d.slice(0,1)}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
            {Array.from({length:firstDow}).map((_,i)=><div key={`b${i}`}/>)}
            {days.map(d=>{
              const tasks=allTasks[d]||[],done=tasks.filter(t=>t.done).length,isT=d===today;
              return(
                <div key={d} onClick={()=>onDayClick(d)} style={{background:isT?C.accentD:C.card,border:`1px solid ${isT?C.accentB:C.border}`,borderRadius:8,padding:"6px 4px",cursor:"pointer",textAlign:"center",minHeight:44}}>
                  <div style={{fontWeight:isT?800:400,fontSize:13,color:isT?C.accent:C.text}}>{new Date(d+"T12:00:00").getDate()}</div>
                  {tasks.length>0&&<div style={{display:"flex",justifyContent:"center",gap:2,marginTop:3,flexWrap:"wrap"}}>{tasks.slice(0,3).map(t=><div key={t.id} style={{width:5,height:5,borderRadius:"50%",background:t.done?"rgba(74,222,128,0.4)":t.color}}/>)}</div>}
                </div>
              );
            })}
          </div>

    // ══════════════════════════════════════════════════════════════════════
    // MAIN APP
    // ══════════════════════════════════════════════════════════════════════
    function App(){
      const[allTasks,setAllTasks]   =useLocalStorage("mp_tasks",{});
      const[templates,setTemplates] =useLocalStorage("mp_templates",[]);
      const[habits,setHabits]       =useLocalStorage("mp_habits",DEFAULT_HABITS);
      const[habitLog,setHabitLog]   =useLocalStorage("mp_habitLog",{});
      const[xp,setXp]               =useLocalStorage("mp_xp",0);
      const[streak,setStreak]       =useLocalStorage("mp_streak",{count:0,lastDate:""});
      const[freezes,setFreezes]     =useLocalStorage("mp_freezes",3);
      const[lastFreezeAt,setLastFreezeAt]=useLocalStorage("mp_lastFreezeAt",0);
      const[onboarded,setOnboarded] =useLocalStorage("mp_onboarded",false);
      const[lastReview,setLastReview]=useLocalStorage("mp_lastReview","");
      const[lastLevel,setLastLevel] =useLocalStorage("mp_lastLevel",0);

      const tKey=todayKey();
      const[mainTab,setMainTab]=useState("today");
      const[selectedDate,setSelectedDate]=useState(tKey);
      const[view,setView]=useState("day");
      const[dayTab,setDayTab]=useState("tasks");
      const[weekStart,setWeekStart]=useState(getWeekStart(tKey));
      const[monthDate,setMonthDate]=useState(tKey);
      const[showForm,setShowForm]=useState(false);
      const[editingTask,setEditingTask]=useState(null);
      const[showTplForm,setShowTplForm]=useState(false);
      const[addAtTime,setAddAtTime]=useState(null);
      const[focusTask,setFocusTask]=useState(null);
      const[mysteryReward,setMysteryReward]=useState(null);
      const[levelUpData,setLevelUpData]=useState(null);
      const[showReview,setShowReview]=useState(false);
      const[toast,setToast]=useState(null);
      const[aiBrief,setAiBrief]=useState("");
      const[aiLoad,setAiLoad]=useState(false);
      const[now,setNow]=useState(new Date());
      const scrollRef=useRef(null);

      const isToday=selectedDate===tKey;
      const rawTasks=allTasks[selectedDate]||[];
      const memory=buildMemory(allTasks);
      const doneTasks=rawTasks.filter(t=>t.done);
      const undoneTasks=rawTasks.filter(t=>!t.done);
      const todayScore=doneTasks.reduce((s,t)=>{const d=DIFF.find(x=>x.v===(t.difficulty||1))||DIFF[0];return s+d.pts;},0);
      const lvl=getLevel(xp);
      const focusTaskOfDay=isToday?rawTasks.find(t=>t.isFocus&&!t.done):null;

      useEffect(()=>{const i=setInterval(()=>setNow(new Date()),15000);return()=>clearInterval(i);},[]);
      useEffect(()=>{if("Notification" in window&&Notification.permission==="default")Notification.requestPermission();},[]);

      useEffect(()=>{
        if(!templates.length)return;
        const merged=applyTemplates(allTasks,templates,selectedDate);
        if(merged.length!==(allTasks[selectedDate]||[]).length)setAllTasks(p=>({...p,[selectedDate]:merged}));
      },[selectedDate,templates]);

      // Streak freeze check
      useEffect(()=>{
        if(!streak.lastDate||streak.lastDate===tKey)return;
        const gap=daysBetween(streak.lastDate,tKey);
        if(gap<=1)return;
        if(gap-1<=freezes&&streak.count>0){
          const used=gap-1;
          setFreezes(f=>Math.max(0,f-used));
          setStreak(s=>({...s,lastDate:tKey}));
          showToast(`❄️ Streak Freeze הציל את ה-streak!`,4000);
        }else if(streak.count>0){
          const lost=streak.count;
          setStreak({count:0,lastDate:""});
          showToast(`💔 ה-streak נשבר אחרי ${lost} ימים`,4500);
        }
      },[streak.lastDate]);

      // Earn freeze
      useEffect(()=>{
        if(streak.count>0&&streak.count%7===0&&streak.count>lastFreezeAt&&freezes<3){
          setFreezes(f=>Math.min(3,f+1));setLastFreezeAt(streak.count);
          showToast("❄️ הרווחת Streak Freeze!",3500);
        }
      },[streak.count]);

      // Level up
      useEffect(()=>{
        if(lvl.min>lastLevel){setLastLevel(lvl.min);if(lastLevel>0||xp>=LEVELS[1].min)setLevelUpData(lvl);}
      },[xp]);

      // Scroll to 8am
      useEffect(()=>{
        if(mainTab==="today"&&view==="day"&&dayTab==="tasks"){
          const tid=setTimeout(()=>{
            const container=scrollRef.current;
            if(container) container.scrollTop=Math.max(0,8*HOUR_HEIGHT-180);
          },200);
          return()=>clearTimeout(tid);
        }
      },[mainTab,view,dayTab,selectedDate]);

      // End of day
      useEffect(()=>{
        if(now.getHours()>=21&&lastReview!==tKey&&rawTasks.length>0&&isToday){
          const tid=setTimeout(()=>setShowReview(true),1500);return()=>clearTimeout(tid);
        }
      },[now,tKey,lastReview,rawTasks.length,isToday]);

      function setDayTasks(fn){setAllTasks(p=>{const c=p[selectedDate]||[],u=typeof fn==="function"?fn(c):fn;return{...p,[selectedDate]:u};});}
      function setTasksFor(dk,fn){setAllTasks(p=>{const c=p[dk]||[],u=typeof fn==="function"?fn(c):fn;return{...p,[dk]:u};});}

      function addTask(t){
        if(!t.title?.trim())return;
        const task={...t,id:Date.now(),done:false};
        setDayTasks(p=>[...p,task].sort((a,b)=>a.hour*60+(a.minute||0)-(b.hour*60+(b.minute||0))));
        if(task.reminder)scheduleNotif(task);
        setShowForm(false);setAddAtTime(null);
        showToast("✅ משימה נוספה!");
      }

      function saveEditedTask(t){
        if(!t.title?.trim())return;
        setDayTasks(tasks=>tasks.map(x=>x.id===t.id?{...t}:x).sort((a,b)=>a.hour*60+(a.minute||0)-(b.hour*60+(b.minute||0))));
        setEditingTask(null);
        showToast("✏️ משימה עודכנה");
      }

      function saveEditedTaskDirect(task,silent=false){
        // called from drag
        setDayTasks(tasks=>tasks.map(x=>x.id===task.id?{...task}:x).sort((a,b)=>a.hour*60+(a.minute||0)-(b.hour*60+(b.minute||0))));
        if(!silent)showToast("↕️ משימה הוזזה");
      }

      function deleteTask(id){setDayTasks(t=>t.filter(x=>x.id!==id));}
      function deleteTemplate(id){setTemplates(p=>p.filter(t=>t.id!==id));}

      function carryAllUndone(){
        if(!undoneTasks.length)return;
        const tomorrow=addDays(selectedDate,1);
        const carried=undoneTasks.map(t=>({...t,id:Date.now()+Math.random(),carriedFrom:selectedDate,done:false}));
        setDayTasks(t=>t.filter(x=>x.done));
        setTasksFor(tomorrow,t=>[...t,...carried].sort((a,b)=>a.hour*60+(a.minute||0)-(b.hour*60+(b.minute||0))));
        showToast(`↺ ${undoneTasks.length} משימות הועברו למחר`,3000);
      }

      function toggleDone(id){
        setDayTasks(tasks=>tasks.map(task=>{
          if(task.id!==id)return task;
          const nowDone=!task.done;
          if(nowDone){
            const d=DIFF.find(x=>x.v===(task.difficulty||1))||DIFF[0];
            setXp(p=>p+d.pts);
            if(selectedDate===tKey)updateStreak();
            if((task.difficulty||1)===3&&Math.random()<0.4){
              setTimeout(()=>{
                const reward=MYSTERY_REWARDS[Math.floor(Math.random()*MYSTERY_REWARDS.length)];
                if(reward.type==="xp")setXp(p=>p+reward.amount);
                if(reward.type==="freeze")setFreezes(f=>Math.min(3,f+reward.amount));
                setMysteryReward(reward);
              },600);
            }else if((task.difficulty||1)===3)showToast(`🔥 +${d.pts} XP — משימה קשה!`,3500);
            else if((task.difficulty||1)===2)showToast(`⚡ +${d.pts} XP`,2500);
            else showToast(`+${d.pts} XP`,2000);
          }
          return{...task,done:nowDone};
        }));
      }

      function toggleHabit(dk,habitId){
        setHabitLog(p=>{
          const day=p[dk]||{};
          const upd={...day,[habitId]:!day[habitId]};
          if(!day[habitId]&&dk===tKey){setXp(x=>x+5);updateStreak();showToast("+5 XP",1500);}
          return{...p,[dk]:upd};
        });
      }

      function updateStreak(){
        setStreak(s=>{
          if(s.lastDate===tKey)return s;
          const y=new Date();y.setDate(y.getDate()-1);
          return{count:s.lastDate===localDateKey(y)?s.count+1:1,lastDate:tKey};
        });
      }

      function showToast(msg,dur=2500){setToast(msg);setTimeout(()=>setToast(null),dur);}

      async function fetchAIBrief(){
        setAiLoad(true);setAiBrief("");
        const hardDone=doneTasks.filter(t=>(t.difficulty||1)===3).length;
        const habitsDone=Object.values(habitLog[tKey]||{}).filter(Boolean).length;
        try{
          const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:`אתה מאמן אישי. המשתמש השלים ${doneTasks.length}/${rawTasks.length} משימות, ${hardDone} קשות, ${habitsDone}/${habits.length} הרגלים, streak ${streak.count} ימים, רמה: ${lvl.name}, ${xp} XP. ${focusTaskOfDay?`משימת הפוקוס: "${focusTaskOfDay.title}".`:""} כתוב הודעת מוטיבציה קצרה ואישית בעברית (2-3 משפטים) עם אמוג'ים.`}]})});
          const data=await res.json();
          setAiBrief(data.content?.[0]?.text||"המשך כך! 💪");
        }catch{setAiBrief("כל יום הוא הזדמנות חדשה. תתמיד! 💪");}
        setAiLoad(false);
      }

      function navBack(){
        if(view==="day")setSelectedDate(addDays(selectedDate,-1));
        else if(view==="week")setWeekStart(addDays(weekStart,-7));
        else setMonthDate(addMonths(monthDate,-1));
      }
      function navFwd(){
        if(view==="day")setSelectedDate(addDays(selectedDate,1));
        else if(view==="week")setWeekStart(addDays(weekStart,7));
        else setMonthDate(addMonths(monthDate,1));
      }
      function navTitle(){
        if(view==="day")return isToday?"היום":fmtDateHeb(selectedDate);
        if(view==="week"){const ws=new Date(weekStart+"T12:00:00"),we=new Date(addDays(weekStart,6)+"T12:00:00");return`${ws.getDate()} – ${we.getDate()} ב${HEB_MONTHS[we.getMonth()]}`;}
        const[y,m]=monthDate.split("-").map(Number);return`${HEB_MONTHS[m-1]} ${y}`;
      }

      const defTask={title:"",hour:addAtTime?.hour??8,minute:addAtTime?.minute??0,durationMins:60,color:C.accent,reminder:true,note:"",ifCue:"",thenCue:"",difficulty:1,isFocus:false};
      const defTpl={title:"",hour:8,minute:0,durationMins:60,color:C.accent,reminder:true,note:"",ifCue:"",thenCue:"",difficulty:1,recurrence:"daily",dow:0,dom:1,isFocus:false};
      const reviewStats={done:doneTasks.length,total:rawTasks.length,xp:todayScore,undone:undoneTasks.length};

      return(
        <div style={{height:"100dvh",display:"flex",flexDirection:"column",background:C.bg,direction:"rtl",position:"relative",overflow:"hidden"}}>

          {/* Background */}
          <div style={{position:"absolute",inset:0,zIndex:0,pointerEvents:"none",overflow:"hidden"}}>
            <div style={{position:"absolute",top:"-15%",right:"-10%",width:520,height:520,borderRadius:"50%",background:`radial-gradient(circle,${lvl.color}10 0%,transparent 65%)`,filter:"blur(80px)",transition:"background 2s"}}/>
            <div style={{position:"absolute",bottom:"5%",left:"-15%",width:450,height:450,borderRadius:"50%",background:"radial-gradient(circle,rgba(74,222,128,0.07) 0%,transparent 65%)",filter:"blur(70px)"}}/>
            <div style={{position:"absolute",inset:0,backgroundImage:"linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px)",backgroundSize:"44px 44px"}}/>
          </div>

          {/* Scrollable content */}
          <div ref={scrollRef} style={{flex:1,overflowY:"auto",overflowX:"hidden",position:"relative",zIndex:1,maxWidth:480,width:"100%",margin:"0 auto"}}>

            {/* ── TODAY TAB ── */}
            {mainTab==="today"&&(
              <>
                {/* Sticky Date Nav */}
                <div style={{position:"sticky",top:0,zIndex:11,padding:"12px 16px 8px",backdropFilter:"blur(20px)",background:"linear-gradient(180deg,rgba(10,11,14,0.97) 80%,transparent)"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <button onClick={navBack} style={{background:C.card,border:`1px solid ${C.border}`,color:C.sub,fontSize:18,width:34,height:34,borderRadius:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"monospace"}}
                      onMouseEnter={e=>e.currentTarget.style.background=C.cardHov} onMouseLeave={e=>e.currentTarget.style.background=C.card}>→</button>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontWeight:900,fontSize:18,letterSpacing:-0.5}}>{navTitle()}{isToday&&" ✦"}</div>
                      {!isToday&&<div style={{fontSize:10,color:C.muted,marginTop:1}}>{fmtDateHeb(selectedDate)}</div>}
                    </div>
                    <button onClick={navFwd} style={{background:C.card,border:`1px solid ${C.border}`,color:C.sub,fontSize:18,width:34,height:34,borderRadius:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"monospace"}}
                      onMouseEnter={e=>e.currentTarget.style.background=C.cardHov} onMouseLeave={e=>e.currentTarget.style.background=C.card}>←</button>
                  </div>
                </div>

                {/* Sticky Hero Strip */}
                <div style={{position:"sticky",top:54,zIndex:10,margin:"0 16px 8px",background:"linear-gradient(135deg,rgba(20,22,28,0.92),rgba(13,14,19,0.92))",border:`1px solid ${C.borderM}`,borderRadius:14,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 8px 28px rgba(0,0,0,0.6)",backdropFilter:"blur(28px)",overflow:"hidden"}}>
                  <div style={{position:"absolute",top:-30,right:-30,width:130,height:130,borderRadius:"50%",background:`radial-gradient(circle,${lvl.color}20 0%,transparent 70%)`,pointerEvents:"none"}}/>
                  <div style={{flex:1,position:"relative"}}>
                    <div style={{fontSize:9,color:C.muted,letterSpacing:0.7,textTransform:"uppercase",marginBottom:1,fontWeight:600}}>ניקוד היום</div>
                    <div style={{fontSize:28,fontWeight:900,color:C.text,lineHeight:1,letterSpacing:-1.2,fontVariantNumeric:"tabular-nums"}}>{todayScore}</div>
                    {rawTasks.length>0&&(
                      <div style={{marginTop:5,maxWidth:130}}>
                        <div style={{height:2,background:"rgba(255,255,255,0.06)",borderRadius:1,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${rawTasks.length?Math.round(doneTasks.length/rawTasks.length*100):0}%`,background:`linear-gradient(90deg,${C.accent},#22c55e)`,borderRadius:1,transition:"width 0.6s ease"}}/>
                        </div>
                        <div style={{fontSize:10,color:C.muted,marginTop:3}}>{doneTasks.length}/{rawTasks.length} משימות</div>
                      </div>
                    )}
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0,position:"relative"}}>
                    <div style={{textAlign:"center",background:streak.count>0?"rgba(251,191,36,0.1)":C.card,border:`1px solid ${streak.count>0?C.amberB:C.border}`,borderRadius:9,padding:"4px 9px",minWidth:38}}>
                      <div style={{fontSize:13,lineHeight:1}}>{streak.count>0?"🔥":"○"}</div>
                      <div style={{fontSize:11,fontWeight:800,color:streak.count>0?C.amber:C.muted,marginTop:1}}>{streak.count}</div>
                    </div>
                    {freezes>0&&(
                      <div style={{textAlign:"center",background:"rgba(125,211,252,0.1)",border:`1px solid ${C.iceB}`,borderRadius:9,padding:"4px 9px",minWidth:38}} title="Streak Freeze">
                        <div style={{fontSize:13,lineHeight:1}}>❄️</div>
                        <div style={{fontSize:11,fontWeight:800,color:C.ice,marginTop:1}}>{freezes}</div>
                      </div>
                    )}
                    <button onClick={()=>setShowForm(true)} style={{width:38,height:38,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},#22c55e)`,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,color:"#000",fontWeight:700,boxShadow:`0 0 16px rgba(74,222,128,0.45)`,flexShrink:0,transition:"transform 0.15s"}}
                      onMouseEnter={e=>e.currentTarget.style.transform="scale(1.1)"}
                      onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}
                    >＋</button>
                  </div>
                </div>

                {/* Focus task banner */}
                {isToday&&focusTaskOfDay&&(
                  <div style={{margin:"0 16px 10px",padding:"12px 14px",background:"linear-gradient(135deg,rgba(251,191,36,0.13),rgba(249,115,22,0.07))",border:"1px solid rgba(251,191,36,0.32)",borderRadius:13}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{fontSize:20}}>★</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:10,color:C.amber,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",marginBottom:1}}>הפוקוס של היום</div>
                        <div style={{fontSize:14,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{focusTaskOfDay.title}</div>
                      </div>
                      <button onClick={()=>setFocusTask(focusTaskOfDay)} style={{background:"rgba(251,191,36,0.15)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:9,padding:"6px 12px",color:C.amber,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif",flexShrink:0}}>התחל</button>
                    </div>
                  </div>
                )}

                {/* AI Brief */}
                {isToday&&(
                  <div style={{padding:"0 16px 10px"}}>
                    {aiBrief?(
                      <div style={{background:"linear-gradient(135deg,rgba(74,222,128,0.1),rgba(74,222,128,0.04))",border:`1px solid rgba(74,222,128,0.22)`,borderRadius:13,padding:"12px 14px",position:"relative"}}>
                        <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:6}}>✨ ההודעה שלך לבוקר</div>
                        <div style={{fontSize:13,lineHeight:1.65,color:"#bbf7d0"}}>{aiBrief}</div>
                        <button onClick={()=>setAiBrief("")} style={{position:"absolute",top:8,left:8,background:"none",border:"none",color:C.muted,fontSize:14,cursor:"pointer"}}>×</button>
                      </div>
                    ):(
                      <button onClick={fetchAIBrief} disabled={aiLoad} style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:"10px 14px",color:C.sub,fontSize:12.5,cursor:"pointer",fontFamily:"Heebo,sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                        <span>{aiLoad?"⏳":"✨"}</span><span>{aiLoad?"מחשב...":"קבל את ההודעה שלך לבוקר"}</span>
                      </button>
                    )}
                  </div>
                )}

                {/* View + sub-tabs */}
                <div style={{position:"sticky",top:128,zIndex:9,padding:"0 16px 10px",background:"linear-gradient(180deg,rgba(10,11,14,0.95) 70%,transparent)",backdropFilter:"blur(16px)"}}>
                  <div style={{display:"flex",gap:6}}>
                    {[{v:"day",l:"יום"},{v:"week",l:"שבוע"},{v:"month",l:"חודש"}].map(({v,l})=>(
                      <button key={v} onClick={()=>setView(v)} style={{padding:"5px 13px",borderRadius:9,border:`1px solid ${view===v?C.accentB:C.border}`,background:view===v?C.accentD:"transparent",color:view===v?C.accent:C.muted,fontSize:12,cursor:"pointer",fontFamily:"Heebo,sans-serif",fontWeight:view===v?700:400}}>
                        {l}
                      </button>
                    ))}
                    {view==="day"&&(
                      <>{/*spacer*/}<div style={{flex:1}}/>
                        {[{v:"tasks",l:"📋"},{v:"habits",l:"🌱"}].map(({v,l})=>(
                          <button key={v} onClick={()=>setDayTab(v)} style={{padding:"5px 11px",borderRadius:9,border:`1px solid ${dayTab===v?C.accentB:C.border}`,background:dayTab===v?C.accentD:"transparent",color:dayTab===v?C.accent:C.muted,fontSize:13,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>
                            {l}
                          </button>
                        ))}
                      </>
                    )}
                  </div>
                </div>

                {/* Empty state */}
                {view==="day"&&dayTab==="tasks"&&rawTasks.length===0&&isToday&&(
                  <div style={{margin:"20px 16px",padding:"24px 20px",background:C.card,border:`1px dashed ${C.border}`,borderRadius:16,textAlign:"center"}}>
                    <div style={{fontSize:42,marginBottom:10}}>🎯</div>
                    <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:6}}>בוא נתחיל את היום</div>
                    <div style={{fontSize:12,color:C.sub,lineHeight:1.6,marginBottom:16}}>לחץ על ＋ או לחץ ישירות על ציר הזמן</div>
                    <button onClick={()=>setShowForm(true)} style={{background:`linear-gradient(135deg,${C.accent},#22c55e)`,border:"none",borderRadius:12,padding:"10px 22px",color:"#000",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>＋ משימה ראשונה</button>
                  </div>
                )}

                {view==="day"&&dayTab==="tasks"&&(
                  <div style={{padding:"0 16px"}}>
                    <VisualTimeline
                      tasks={rawTasks}
                      isToday={isToday}
                      now={now}
                      selectedDate={selectedDate}
                      onToggle={toggleDone}
                      onEdit={(task,isDrag)=>isDrag?saveEditedTaskDirect(task,true):setEditingTask(task)}
                      onDelete={deleteTask}
                      onFocus={setFocusTask}
                      onAddAt={(h,m)=>{setAddAtTime({hour:h,minute:m});setShowForm(true);}}
                    />
                  </div>
                )}

                {view==="day"&&dayTab==="habits"&&(
                  <HabitsPanel habits={habits} habitLog={habitLog} dateKey={selectedDate}
                    onToggle={toggleHabit}
                    onAdd={h=>setHabits(p=>[...p,h])}
                    onDelete={id=>setHabits(p=>p.filter(h=>h.id!==id))}
                    onEditHabit={updated=>setHabits(p=>p.map(h=>h.id===updated.id?updated:h))}
                  />
                )}

                {view==="week"&&<WeeklyView allTasks={allTasks} weekStart={weekStart} onDayClick={d=>{setSelectedDate(d);setView("day");}}/>}
                {view==="month"&&<MonthlyView allTasks={allTasks} monthDate={monthDate} onDayClick={d=>{setSelectedDate(d);setView("day");}}/>}
              </>
            )}

            {/* ── STATS TAB ── */}
            {mainTab==="stats"&&(
              <div style={{padding:"16px 0 32px"}}>
                <div style={{margin:"0 16px 14px",background:"linear-gradient(135deg,rgba(255,255,255,0.07),rgba(255,255,255,0.02))",border:`1px solid ${C.borderM}`,borderRadius:22,padding:"22px 22px 20px",position:"relative",overflow:"hidden",boxShadow:"0 12px 36px rgba(0,0,0,0.5)"}}>
                  <div style={{position:"absolute",top:-50,right:-50,width:220,height:220,borderRadius:"50%",background:`radial-gradient(circle,${lvl.color}24 0%,transparent 70%)`,pointerEvents:"none"}}/>
                  <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",position:"relative",marginBottom:14}}>
                    <div>
                      <div style={{fontSize:11,color:C.muted,letterSpacing:1,textTransform:"uppercase",fontWeight:600,marginBottom:4}}>ניקוד היום</div>
                      <div style={{fontSize:56,fontWeight:900,color:C.text,lineHeight:1,letterSpacing:-2.5,fontVariantNumeric:"tabular-nums"}}>{todayScore}</div>
                      <div style={{marginTop:8,fontSize:12,color:C.sub}}>{doneTasks.length}/{rawTasks.length} משימות</div>
                    </div>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontSize:36,lineHeight:1}}>{lvl.icon}</div>
                      <div style={{fontSize:12,fontWeight:800,color:lvl.color,marginTop:4}}>{lvl.name}</div>
                      <div style={{fontSize:10,color:C.muted,marginTop:2}}>{xp} XP</div>
                    </div>
                  </div>
                  {lvl.next&&(
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.muted,marginBottom:5}}>
                        <span>{lvl.icon} {lvl.name}</span><span>{lvl.pct}% → {lvl.next.icon} {lvl.next.name}</span>
                      </div>
                      <div style={{height:5,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${lvl.pct}%`,background:`linear-gradient(90deg,${lvl.color},${lvl.next.color})`,borderRadius:3,transition:"width 1s ease"}}/>
                      </div>
                    </div>
                  )}
                </div>

                <StreakChain allTasks={allTasks} habitLog={habitLog} today={tKey}/>

                <div style={{padding:"14px 16px 0",display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[
                    {l:"Streak",v:`${streak.count} ימים`,i:"🔥",c:C.amber},
                    {l:"Freezes",v:`${freezes}/3`,i:"❄️",c:C.ice},
                    {l:"ימים פעילים",v:Object.keys(allTasks).filter(k=>(allTasks[k]||[]).length>0).length,i:"📅",c:C.sub},
                    {l:"קשות הושלמו",v:Object.values(allTasks).flat().filter(t=>t.done&&(t.difficulty||1)===3).length,i:"💪",c:C.hot},
                  ].map(s=>(
                    <div key={s.l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px"}}>
                      <div style={{fontSize:18,marginBottom:4}}>{s.i}</div>
                      <div style={{fontWeight:800,fontSize:18,color:s.c}}>{s.v}</div>
                      <div style={{fontSize:10,color:C.muted,marginTop:2}}>{s.l}</div>
                    </div>
                  ))}
                </div>

                <div style={{padding:"14px 16px 0"}}>
                  {aiBrief?(
                    <div style={{background:"rgba(74,222,128,0.07)",border:`1px solid rgba(74,222,128,0.18)`,borderRadius:13,padding:"12px 14px",position:"relative"}}>
                      <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:6}}>✨ מוטיבציה</div>
                      <div style={{fontSize:13,lineHeight:1.65,color:"#bbf7d0"}}>{aiBrief}</div>
                      <button onClick={()=>setAiBrief("")} style={{position:"absolute",top:8,left:8,background:"none",border:"none",color:C.muted,fontSize:14,cursor:"pointer"}}>×</button>
                    </div>
                  ):(
                    <button onClick={fetchAIBrief} disabled={aiLoad} style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:"12px",color:C.sub,fontSize:13,cursor:"pointer",fontFamily:"Heebo,sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                      <span>{aiLoad?"⏳":"✨"}</span><span>{aiLoad?"מחשב...":"קבל עידוד מ-AI"}</span>
                    </button>
                  )}
                </div>
              </div>
            )}

            {/* ── MANAGE TAB ── */}
            {mainTab==="manage"&&(
              <div style={{padding:"18px 0 32px"}}>
                <HabitsPanel habits={habits} habitLog={habitLog} dateKey={selectedDate}
                  onToggle={toggleHabit}
                  onAdd={h=>setHabits(p=>[...p,h])}
                  onDelete={id=>setHabits(p=>p.filter(h=>h.id!==id))}
                  onEditHabit={updated=>setHabits(p=>p.map(h=>h.id===updated.id?updated:h))}
                />
                <div style={{padding:"0 16px"}}>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <div style={{fontWeight:700,fontSize:14,color:C.text}}>📌 תבניות חוזרות</div>
                      <button onClick={()=>setShowTplForm(true)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 11px",color:C.sub,fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>+ הוסף</button>
                    </div>
                    {templates.length===0&&<div style={{color:C.muted,fontSize:12,padding:"4px 0"}}>אין תבניות עדיין</div>}
                    {templates.map(tpl=>(
                      <div key={tpl.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
                        <div style={{width:9,height:9,borderRadius:"50%",background:tpl.color,flexShrink:0}}/>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:600,color:C.text}}>{tpl.title}</div>
                          <div style={{fontSize:11,color:C.muted}}>{fmtTime(tpl.hour,tpl.minute||0)} · {fmtDur(tpl.durationMins)} · {tpl.recurrence==="daily"?"כל יום":tpl.recurrence==="weekly"?HEB_DAYS[tpl.dow||0]:`${tpl.dom} לחודש`}</div>
                        </div>
                        <button onClick={()=>deleteTemplate(tpl.id)} style={{background:"none",border:"none",color:C.muted,fontSize:15,cursor:"pointer"}}
                          onMouseEnter={e=>e.currentTarget.style.color="#f472b6"}
                          onMouseLeave={e=>e.currentTarget.style.color=C.muted}>×</button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Bottom Tab Bar */}
          <div style={{position:"relative",zIndex:10,background:"rgba(10,11,14,0.97)",borderTop:`1px solid ${C.border}`,backdropFilter:"blur(20px)",flexShrink:0}}>
            <div style={{display:"flex",maxWidth:480,margin:"0 auto"}}>
              {[{v:"today",icon:"📋",label:"היום"},{v:"stats",icon:"📊",label:"סטטס"},{v:"manage",icon:"⚙️",label:"ניהול"}].map(({v,icon,label})=>(
                <button key={v} onClick={()=>setMainTab(v)} style={{flex:1,padding:"11px 0 13px",background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:"Heebo,sans-serif",opacity:mainTab===v?1:0.42,transition:"opacity 0.15s"}}>
                  <span style={{fontSize:21,lineHeight:1}}>{icon}</span>
                  <span style={{fontSize:10,fontWeight:mainTab===v?700:400,color:mainTab===v?C.accent:C.muted}}>{label}</span>
                  {mainTab===v&&<div style={{width:20,height:2,background:C.accent,borderRadius:1,marginTop:2}}/>}
                </button>
              ))}
            </div>
          </div>

          {/* Modals */}
          {!onboarded&&<Onboarding onDone={()=>setOnboarded(true)}/>}
          {showForm&&<TaskForm initial={defTask} memory={memory} onSave={addTask} onClose={()=>{setShowForm(false);setAddAtTime(null);}}/>}
          {editingTask&&<TaskForm initial={editingTask} memory={memory} onSave={saveEditedTask} onClose={()=>setEditingTask(null)} title="✎ עריכת משימה"/>}
          {showTplForm&&<TaskForm initial={defTpl} memory={memory} onSave={t=>{if(!t.title?.trim())return;setTemplates(p=>[...p,{...t,id:Date.now()}]);setShowTplForm(false);showToast("📌 תבנית נשמרה!");}} onClose={()=>setShowTplForm(false)} isTemplate title="📌 תבנית חוזרת"/>}
          {focusTask&&<FocusMode task={focusTask} onClose={()=>setFocusTask(null)} onComplete={m=>{setXp(p=>p+Math.round(m/5));showToast(`✓ +${Math.round(m/5)} XP על פוקוס`,2500);}}/>}
          {mysteryReward&&<MysteryBoxModal reward={mysteryReward} onClose={()=>setMysteryReward(null)}/>}
          {levelUpData&&<LevelUpModal level={levelUpData} onClose={()=>setLevelUpData(null)}/>}
          {showReview&&<EndOfDayReview stats={reviewStats} onClose={()=>{setShowReview(false);setLastReview(tKey);}} onCarryAll={()=>{carryAllUndone();setShowReview(false);setLastReview(tKey);}}/>}

          {toast&&(
            <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:"rgba(13,14,19,0.97)",border:`1px solid ${C.borderM}`,borderRadius:14,padding:"11px 24px",fontSize:14,fontWeight:500,zIndex:200,boxShadow:"0 8px 32px rgba(0,0,0,0.7)",whiteSpace:"nowrap",maxWidth:"88vw",textAlign:"center",animation:"toastIn 0.35s cubic-bezier(.34,1.56,.64,1)"}}>
              {toast}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
